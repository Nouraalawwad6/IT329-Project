<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winter Flavors | Login</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="home">
    <section class="card">

      <h1 class="app-name">Login</h1>
      <p class="tagline">Welcome back to Winter Flavors</p>
      
<p id="loginMessage" class="error-message"></p>

     <form class="login-form" action="login.php" method="POST">
<p id="errorMsgg" style="
  display: none;
  color: #b91c1c;             
  background-color: #ffe5e5;   
  border: 1px solid #f5b5b5;
  padding: 10px 12px;
  border-radius: 8px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 15px;
"></p>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="Enter your email"
      required
    />
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="Enter your password"
      required
    />
  </div>

  <div class="btn-group">
    <button type="submit" class="btn primary">
      Login
    </button>
  </div>

</form>

      <p class="new-user">
        New User?
        <a href="Signuppage.html" class="link">Sign-up</a>
      </p>

      <p class="new-user">
        Back to
        <a href="Homepage.html" class="link">Home</a>
      </p>


    </section>
  </main>
    <script src="script.js"></script>
  <script>
document.addEventListener("DOMContentLoaded", function() {
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");
const msg = document.getElementById("errorMsgg");
 if (msg) {
  if (error === "loginRequired") {
      msg.innerText = "You must login first!";
      msg.style.display = "block";
    }
    else if (error === "adminOnly") {
      msg.innerText = "Access Denied: Admin privileges required!";
      msg.style.display = "block";
    }
    
  }
});
</script>
</body>
</html>
